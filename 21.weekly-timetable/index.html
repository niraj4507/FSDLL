<!DOCTYPE html>
<html>
<head>
    <title>Weekly Timetable</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>21. Weekly Timetable</h2>

<table>
    <tr>
        <th>Day/Time</th>
        <th>9-10</th>
        <th>10-11</th>
        <th>11-12</th>
        <th>12-1</th>
        <th>1-2</th>
    </tr>

    <tr>
        <td>Monday</td>
        <td>Math</td>
        <td>Science</td>
        <td rowspan="2">Lab</td>
        <td colspan="2">Project</td>
    </tr>

    <tr>
        <td>Tuesday</td>
        <td>English</td>
        <td>Math</td>
        <td>Sports</td>
        <td>Library</td>
    </tr>

    <tr>
        <td>Wednesday</td>
        <td colspan="2">Workshop</td>
        <td>Science</td>
        <td>Math</td>
        <td>English</td>
    </tr>

    <tr>
        <td>Thursday</td>
        <td>Computer</td>
        <td>Math</td>
        <td>Science</td>
        <td colspan="2">Seminar</td>
    </tr>

    <tr>
        <td>Friday</td>
        <td>English</td>
        <td colspan="2">Lab</td>
        <td>Computer</td>
        <td>Sports</td>
    </tr>
</table>

</body>
</html>
