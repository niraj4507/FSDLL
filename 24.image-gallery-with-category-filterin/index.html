<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery Filter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>24. Image Gallery with Filtering</h2>

<!-- Filter Buttons -->
<div class="buttons">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('animals')">Animals</button>
</div>

<!-- Gallery -->
<div class="gallery">
    <img src="https://via.placeholder.com/150" data-category="nature">
    <img src="https://via.placeholder.com/150" data-category="animals">
    <img src="https://via.placeholder.com/150" data-category="nature">
    <img src="https://via.placeholder.com/150" data-category="animals">
    <img src="https://via.placeholder.com/150" data-category="nature">
    <img src="https://via.placeholder.com/150" data-category="animals">
</div>

<script src="script.js"></script>
</body>
</html>
