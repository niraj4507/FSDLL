<!DOCTYPE html>
<html>
<head>
    <title>HTML Tags Glossary</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

<h2>HTML Tags Glossary</h2>
<input type="text" id="search" placeholder="Search HTML tags..." onkeyup="filterTable()">

<table id="tagTable">
    <tr>
        <th>Tag</th>
        <th>Description</th>
    </tr>
    <tr><td>&lt;b&gt;</td><td>Bold text</td></tr>
    <tr><td>&lt;i&gt;</td><td>Italic text</td></tr>
    <tr><td>&lt;u&gt;</td><td>Underlined text</td></tr>
    <tr><td>&lt;p&gt;</td><td>Paragraph</td></tr>
    <tr><td>&lt;h1&gt;</td><td>Heading</td></tr>
</table>
<script src="script.js"></script>
</body>
</html>
