<!DOCTYPE html>
<html>
<head>
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>16. Quiz Application</h2>

<div id="quiz">

    <div class="question">
        <p>1. What does HTML stand for?</p>
        <input type="radio" name="q1" value="0"> Hyper Trainer Marking Language<br>
        <input type="radio" name="q1" value="1"> Hyper Text Markup Language<br>
    </div>

    <div class="question">
        <p>2. Which is used for styling?</p>
        <input type="radio" name="q2" value="1"> CSS<br>
        <input type="radio" name="q2" value="0"> HTML<br>
    </div>

    <div class="question">
        <p>3. Which is a programming language?</p>
        <input type="radio" name="q3" value="1"> JavaScript<br>
        <input type="radio" name="q3" value="0"> CSS<br>
    </div>

</div> 

<button onclick="submitQuiz()">Submit</button>

<h3 id="result"></h3>

<script src="script.js"></script>
</body>
</html>
